name: CI

on:
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/ci.yaml'
      - '.github/ci/**'
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

  install:
    name: Install & Upgrade Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Check for changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1

      # radar-hub is BYO-Postgres (never installs a DB). Stand up a
      # disposable Postgres the chart's ci/test-values.yaml DSN points at,
      # so the install test exercises migrate + hub readiness for real.
      - name: Deploy throwaway Postgres
        if: steps.list-changed.outputs.changed == 'true'
        run: |
          kubectl apply -f .github/ci/postgres.yaml
          kubectl -n radar-hub-ci rollout status deploy/radar-hub-postgres --timeout=120s

      # --namespace pins both the old (1.0.0) and current installs into the
      # namespace that holds the Postgres above, so the bare-hostname DSN
      # resolves for the upgrade test's old-revision install too.
      - name: Run chart-testing (install & upgrade)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --upgrade --target-branch ${{ github.event.repository.default_branch }} --namespace radar-hub-ci
