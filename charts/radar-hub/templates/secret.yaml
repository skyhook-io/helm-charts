{{/*
chart-managed Secret. Holds whichever of these are configured INLINE
(values.yaml plaintext or rendered from helm --set):
  - postgres-dsn
  - cookie-password
  - license-key
  - oidc-client-secret
  - break-glass-password / break-glass-password-hash

For each one, the customer can EITHER set the inline value OR point at
an existingSecret ref — never both. Setting both is a fatal
misconfiguration; the deployment Pod would read from the existingSecret
ref while the chart's own Secret quietly held the inline value, so the
inline write would be silently ignored.

When EVERY credential uses an existingSecret ref (the
Sealed-Secrets / SOPS / external-secrets shape), the chart's own
Secret has no keys to write and is skipped entirely — Kubernetes
considers an empty stringData Secret valid but it's pointless to
ship one.

Why one Secret instead of one per concern: customers tend to wrap
whole charts in a sealing workflow; one Secret keeps the sealing
surface small. Per-key existingSecret refs are still honored for ops
shops that prefer separation.
*/}}

{{- /* Fail fast — required-value gates that always run regardless of
       whether the chart's own Secret will render. */}}
{{- if not .Values.hub.publicURL -}}
{{- fail "hub.publicURL is required (e.g. https://radar.acme.example)" -}}
{{- end -}}

{{- if and (not .Values.postgres.dsn) (not .Values.postgres.existingSecret) (not .Values.postgres.cnpg.cluster) -}}
{{- fail "postgres: set one of postgres.dsn, postgres.existingSecret, or postgres.cnpg.cluster" -}}
{{- end -}}

{{- if and (not .Values.hub.cookiePassword) (not .Values.hub.cookiePasswordExistingSecret) -}}
{{- fail "hub.cookiePassword: set hub.cookiePassword (32+ bytes) or hub.cookiePasswordExistingSecret" -}}
{{- end -}}

{{- if and (not .Values.license.key) (not .Values.license.existingSecret) -}}
{{- fail "license: set license.key or license.existingSecret" -}}
{{- end -}}

{{- if and .Values.auth.oidc.issuer (not .Values.auth.oidc.clientSecret) (not .Values.auth.oidc.clientSecretExistingSecret) -}}
{{- fail "auth.oidc.issuer is set but no client secret — set auth.oidc.clientSecret or auth.oidc.clientSecretExistingSecret" -}}
{{- end -}}

{{- if and .Values.auth.breakGlass.email
      (not .Values.auth.breakGlass.password)
      (not .Values.auth.breakGlass.passwordHash)
      (not .Values.auth.breakGlass.passwordHashExistingSecret) -}}
{{- fail "auth.breakGlass.email is set but no credential — set auth.breakGlass.password, .passwordHash, or .passwordHashExistingSecret" -}}
{{- end -}}

{{- /* Inline-AND-existingSecret conflict catches. The deployment Pod's
       secretKeyRef uses `default chartSecret existingSecret`, so a
       non-empty existingSecret always wins — silently dropping the
       inline value. Forbid the combo so the operator can't be
       surprised at first sign-in. */}}
{{- if and .Values.postgres.dsn (or .Values.postgres.existingSecret .Values.postgres.cnpg.cluster) -}}
{{- fail "postgres: set EITHER postgres.dsn OR (postgres.existingSecret / postgres.cnpg.cluster), not both" -}}
{{- end -}}
{{- if and .Values.hub.cookiePassword .Values.hub.cookiePasswordExistingSecret -}}
{{- fail "hub.cookiePassword conflicts with hub.cookiePasswordExistingSecret — pick one" -}}
{{- end -}}
{{- if and .Values.license.key .Values.license.existingSecret -}}
{{- fail "license.key conflicts with license.existingSecret — pick one" -}}
{{- end -}}
{{- if and .Values.auth.oidc.clientSecret .Values.auth.oidc.clientSecretExistingSecret -}}
{{- fail "auth.oidc.clientSecret conflicts with auth.oidc.clientSecretExistingSecret — pick one" -}}
{{- end -}}
{{- if and .Values.auth.breakGlass.passwordHash .Values.auth.breakGlass.passwordHashExistingSecret -}}
{{- fail "auth.breakGlass.passwordHash conflicts with auth.breakGlass.passwordHashExistingSecret — pick one" -}}
{{- end -}}
{{- if and .Values.auth.breakGlass.password .Values.auth.breakGlass.passwordHashExistingSecret -}}
{{- fail "auth.breakGlass.password conflicts with auth.breakGlass.passwordHashExistingSecret — pick one" -}}
{{- end -}}

{{- /* Skip rendering the Secret entirely when every credential is
       sourced from an external ref. K8s permits empty stringData but
       the empty Secret would be cargo-cult noise. */}}
{{- $hasInline := or
      .Values.postgres.dsn
      .Values.hub.cookiePassword
      .Values.license.key
      (and .Values.auth.oidc.issuer .Values.auth.oidc.clientSecret)
      .Values.auth.breakGlass.passwordHash
      .Values.auth.breakGlass.password
-}}
{{- if $hasInline }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "radar-hub.secretName" . }}
  labels:
    {{- include "radar-hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgres.dsn }}
  postgres-dsn: {{ .Values.postgres.dsn | quote }}
  {{- end }}

  {{- if .Values.hub.cookiePassword }}
  cookie-password: {{ .Values.hub.cookiePassword | quote }}
  {{- end }}

  {{- if .Values.license.key }}
  license-key: {{ .Values.license.key | quote }}
  {{- end }}

  {{- if and .Values.auth.oidc.issuer .Values.auth.oidc.clientSecret }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}

  {{- if .Values.auth.breakGlass.passwordHash }}
  break-glass-password-hash: {{ .Values.auth.breakGlass.passwordHash | quote }}
  {{- else if .Values.auth.breakGlass.password }}
  break-glass-password: {{ .Values.auth.breakGlass.password | quote }}
  {{- end }}
{{- end }}
