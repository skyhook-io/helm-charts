{{/*
chart-managed Secret. Holds:
  - postgres-dsn   (only when neither existingSecret nor cnpg.cluster is set)
  - cookie-password
  - license-key    (only when license.existingSecret is empty)
  - oidc-client-secret (only when oidc.clientSecretExistingSecret is empty)
  - break-glass-password / break-glass-password-hash (only when their
    respective existingSecret refs are empty)

Why one Secret instead of one per concern: customers tend to wrap whole
charts in a Sealed-Secrets / SOPS workflow; one Secret keeps the
sealing surface small. Per-key existingSecret refs are still honored
for ops shops that prefer separation.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "radar-hub.secretName" . }}
  labels:
    {{- include "radar-hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and (not .Values.postgres.existingSecret) (not .Values.postgres.cnpg.cluster) }}
  {{- if not .Values.postgres.dsn }}
  {{- fail "postgres: set one of postgres.dsn, postgres.existingSecret, or postgres.cnpg.cluster" }}
  {{- end }}
  postgres-dsn: {{ .Values.postgres.dsn | quote }}
  {{- end }}

  {{- if .Values.hub.cookiePassword }}
  cookie-password: {{ .Values.hub.cookiePassword | quote }}
  {{- else if not .Values.hub.cookiePasswordExistingSecret }}
  {{- fail "hub.cookiePassword: set hub.cookiePassword (32+ bytes) or hub.cookiePasswordExistingSecret" }}
  {{- end }}

  {{- if .Values.license.key }}
  license-key: {{ .Values.license.key | quote }}
  {{- else if not .Values.license.existingSecret }}
  {{- fail "license: set license.key or license.existingSecret" }}
  {{- end }}

  {{- if and .Values.auth.oidc.issuer .Values.auth.oidc.clientSecret (not .Values.auth.oidc.clientSecretExistingSecret) }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}

  {{- if .Values.auth.breakGlass.passwordHash }}
  break-glass-password-hash: {{ .Values.auth.breakGlass.passwordHash | quote }}
  {{- else if and .Values.auth.breakGlass.password (not .Values.auth.breakGlass.passwordHashExistingSecret) }}
  break-glass-password: {{ .Values.auth.breakGlass.password | quote }}
  {{- end }}
