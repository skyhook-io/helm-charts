{{- if .Values.ingress.enabled -}}
{{/*
Single-host Ingress: SPA + hub API behind one DNS name. The web image's
nginx routes /api + /agent to the hub Service in-cluster, so the Ingress
only needs to forward everything to the web Service. Customers wanting
to split origins (api.acme.example + app.acme.example) can disable this
chart's Ingress and write their own.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "radar-hub.fullname" . }}
  labels:
    {{- include "radar-hub.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ required "ingress.host is required when ingress.enabled=true" .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ required "ingress.host is required when ingress.enabled=true" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "radar-hub.webName" . }}
                port:
                  number: {{ .Values.service.webPort }}
{{- end }}
