{{- if hasKey .Values.service "type" -}}
{{- fail "service.type was replaced by service.web.type and service.hub.type. Set service.web.type for public exposure; keep service.hub.type=ClusterIP unless you intentionally expose the raw hub API." -}}
{{- end -}}
{{- if or (hasKey .Values.service "hubPort") (hasKey .Values.service "webPort") -}}
{{- fail "service.hubPort/service.webPort were replaced by service.hub.port/service.web.port." -}}
{{- end -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "radar-hub.hubName" . }}
  labels:
    {{- include "radar-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  type: {{ .Values.service.hub.type }}
  ports:
    - port: {{ .Values.service.hub.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "radar-hub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: hub
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "radar-hub.webName" . }}
  labels:
    {{- include "radar-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.web.type }}
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "radar-hub.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
