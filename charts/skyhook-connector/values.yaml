# Default values for skyhook-connector.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/skyhook-io/skyhook-connector
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v2.5.5"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  # name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8090

resources:
  # The connector watches all cluster resources via informers, so CPU/memory scale
  # with cluster size — especially during a full sync (a CPU-heavy collect+marshal
  # of every object). Defaults are burstable (limit >> request): the request is the
  # guaranteed floor that keeps task serving responsive under node contention; the
  # limit allows bursting into node headroom during sync.
  #
  # For very large clusters, raise the CPU limit (or remove it entirely so the agent
  # can use whatever headroom the node has — common for informer-based agents). The
  # connector self-throttles its background sync to prioritize interactive tasks and
  # auto-sizes GOMEMLIMIT from the memory limit, so it stays a good guest at whatever
  # values you set here.
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 0.4
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: [
  {
    key: "kubernetes.io/arch",
    operator: "Equal",
    value: "arm64",
    effect: "NoSchedule"
  }
]

affinity: {}

# Name of the secret to use for the API key. Keep empty to use the default secret name.
existingSecret: ""

# Number of concurrent tasks to run.
workerPoolSize: 5

# Watch Kubernetes Events in the connector cache and sync stream.
# Disable for large/high-churn clusters; event lookups still use on-demand API reads.
watchEvents: true

# RBAC settings.
rbac:
  # When true, grants the connector a namespaced Role to patch its own Deployment.
  # Required for one-click upgrade from the Skyhook UI (the connector patches its
  # container image and lets Kubernetes roll the pod). Scoped to the connector's
  # own Deployment only via resourceNames; no cluster-wide write access.
  # Set false to disable in-cluster self-upgrade (you would then helm-upgrade manually).
  selfUpgrade: true

# API key to use for the agent (to be placed in the secret). Expected to be provided during 'helm install'.
apiKey: "placeholder"
