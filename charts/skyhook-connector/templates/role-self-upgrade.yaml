{{- if .Values.rbac.selfUpgrade }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "skyhook-agent.fullname" . }}-self-upgrade
  {{- if hasKey .Release "Namespace" }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "skyhook-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: [{{ include "skyhook-agent.fullname" . | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "skyhook-agent.fullname" . }}-self-upgrade
  {{- if hasKey .Release "Namespace" }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "skyhook-agent.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "skyhook-agent.serviceAccountName" . }}
    {{- if hasKey .Release "Namespace" }}
    namespace: {{ .Release.Namespace }}
    {{- end }}
roleRef:
  kind: Role
  name: {{ include "skyhook-agent.fullname" . }}-self-upgrade
  apiGroup: rbac.authorization.k8s.io
{{- end }}
